backend:
  name: github
  repo: NextGenPlant/NextGenSite
  branch: main
  # Optional: after deploying https://github.com/sveltia/sveltia-cms-auth on Cloudflare Workers,
  # set base_url to your worker URL so the owner can sign in with GitHub (no personal token).
  # base_url: https://YOUR-WORKER.workers.dev

# For local editing with `npx decap-server` while `npm start` is running:
# local_backend: true

site_url: https://nextgenplant.co.uk
logo_url: /wp-content/uploads/logo-reverse.svg

media_folder: wp-content/uploads
public_folder: /wp-content/uploads

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: news
    label: News
    label_singular: News post
    folder: src/whats-new
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} ({{date}})"
    sortable_fields:
      fields: [title, date]
      default:
        field: date
        direction: descending
    fields:
      - label: Title
        name: title
        widget: string
      - label: Publish date
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Short description
        name: description
        widget: string
        hint: Used for search / social previews.
      - label: Featured image
        name: image
        widget: image
        choose_url: false
      - label: Image alt text
        name: imageAlt
        widget: string
      - label: Excerpt
        name: excerpt
        widget: text
        hint: Shown on the News listing and Latest News cards.
      - label: Body
        name: body
        widget: markdown
